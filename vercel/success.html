<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Prompt Archive Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .container {
      max-width: 600px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #10a37f 0%, #059669 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 32px;
    }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 16px; }
    p { color: #94a3b8; margin-bottom: 32px; line-height: 1.6; }
    .license-box {
      background: rgba(16,163,127,0.1);
      border: 2px dashed #10a37f;
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
    }
    .license-label {
      font-size: 12px;
      color: #10a37f;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .license-key {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      word-break: break-all;
    }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, #10a37f 0%, #059669 100%);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      margin-top: 24px;
    }
    .warning {
      background: rgba(245,158,11,0.1);
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      font-size: 14px;
      color: #f59e0b;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-icon">✓</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for purchasing Prompt Archive Pro. Your license key is below.</p>
    
    <div class="license-box">
      <div class="license-label">Your License Key</div>
      <div class="license-key" id="licenseKey">Loading...</div>
    </div>
    
    <div class="warning">
      ⚠️ <strong>Important:</strong> Copy this key now! Also check your email (including spam folder).
    </div>
    
    <a href="https://aaaaaa-alpha-inky.vercel.app/" class="btn">Open Extension</a>
  </div>

  <script>
    // Get license key from URL (passed by Dodo)
    const urlParams = new URLSearchParams(window.location.search);
    const licenseKey = urlParams.get('license_key') || 'XXXX-XXXX-XXXX-XXXX';
    document.getElementById('licenseKey').textContent = licenseKey;
    
    // Auto-copy to clipboard
    navigator.clipboard.writeText(licenseKey).then(() => {
      console.log('License key copied to clipboard');
    });
  </script>
</body>
</html>
